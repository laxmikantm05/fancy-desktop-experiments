# ─────────────────────────────────────────────
# Core layout (2-line prompt)
# ─────────────────────────────────────────────
add_newline = false

format = """
$os$directory$git_branch$fill$cmd_duration$time
$character
"""

# ─────────────────────────────────────────────
# OS (distro icon)
# ─────────────────────────────────────────────
[os]
disabled = false
format = "[$symbol](bold white) "

[os.symbols]
AIX = " "
AlmaLinux = " "
Alpaquita = " "
Alpine = " "
ALTLinux = " "
